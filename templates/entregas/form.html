{% extends "base.html" %}
{% block title %}{% if mode=='create' %}Crear entrega{% else %}Editar entrega{% endif %}{% endblock %}

{% block content %}
<div class="card shadow-sm">
  <div class="card-body">
    <h2 class="mb-3">{% if mode=='create' %}Crear entrega{% else %}Editar entrega{% endif %}</h2>

    <form method="post">

      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label">Edificio *</label>
          <input class="form-control" name="edificio" required
                 value="{{ entrega.edificio if entrega else '' }}">
        </div>

        <div class="col-md-4">
          <label class="form-label">Piso *</label>
          <input class="form-control" name="piso" required
                 value="{{ entrega.piso if entrega else '' }}">
        </div>

        <select class="form-select" name="ceco_id" id="cecoSelect" required>
  <option value="">-- Seleccionar --</option>
  {% for c in cecos %}
    <option
      value="{{ c.id }}"
      data-ceco="{{ c.ceco }}"
      data-jefatura="{{ c.nombre_jefatura }}"
      data-area="{{ c.area }}"
      {% if entrega and entrega.ceco_id == c.id %}selected{% endif %}>
      {{ c.area }}
    </option>
  {% endfor %}
</select>

        <div class="col-md-6">
          <label class="form-label">CECO (auto)</label>
          <input class="form-control" id="cecoAuto" readonly
                 value="{{ entrega.ceco if entrega else '' }}">
        </div>

        <div class="col-md-6">
          <label class="form-label">Jefatura (auto)</label>
          <input class="form-control" id="jefaturaAuto" readonly
                 value="{{ entrega.jefatura if entrega else '' }}">
        </div>

        <div class="col-md-6">
          <label class="form-label">Nombre *</label>
          <input class="form-control" name="nombre" required
                 value="{{ entrega.nombre if entrega else '' }}">
        </div>

        <div class="col-md-6">
          <label class="form-label">Extensión</label>
          <input class="form-control" name="extension"
                 value="{{ entrega.extension if entrega and entrega.extension else '' }}">
        </div>

        <div class="col-md-12">
          <label class="form-label">Ubicación exacta</label>
          <input class="form-control" name="ubicacion_exacta"
                 value="{{ entrega.ubicacion_exacta if entrega and entrega.ubicacion_exacta else '' }}">
        </div>

        <div class="col-md-12">
          <label class="form-label">Justificación *</label>
          <textarea class="form-control" name="justificacion" rows="3" required>{{ entrega.justificacion if entrega else '' }}</textarea>
        </div>

        <div class="col-md-6">
          <label class="form-label">Equipo actual *</label>
          <input class="form-control" name="equipo_actual" required
                 value="{{ entrega.equipo_actual if entrega else '' }}">
        </div>

        <div class="col-md-6">
          <label class="form-label">Nueva placa SIFA *</label>
          <input class="form-control" name="nueva_placa_sifa" required
                 value="{{ entrega.nueva_placa_sifa if entrega else '' }}">
        </div>

        <div class="col-md-6">
          <label class="form-label">Fecha de entrega *</label>
          <input class="form-control" type="date" name="fecha_entrega" required
                 value="{{ entrega.fecha_entrega.strftime('%Y-%m-%d') if entrega else '' }}">
        </div>

        <div class="col-md-12">
          <label class="form-label">Observaciones</label>
          <textarea class="form-control" name="observaciones" rows="2">{{ entrega.observaciones if entrega and entrega.observaciones else '' }}</textarea>
        </div>
      </div>

      <div class="mt-3 d-flex gap-2">
        <button class="btn btn-success" type="submit">Guardar</button>
        <a class="btn btn-outline-secondary" href="{{ url_for('entregas.list_entregas') }}">Volver</a>
      </div>

    </form>
  </div>
</div>

<script>
  const select = document.getElementById("cecoSelect");
  const cecoAuto = document.getElementById("cecoAuto");
  const jefaturaAuto = document.getElementById("jefaturaAuto");

  function updateAutoFields() {
    const opt = select.options[select.selectedIndex];
    if (!opt || !opt.value) {
      cecoAuto.value = "";
      jefaturaAuto.value = "";
      return;
    }
    cecoAuto.value = opt.dataset.ceco || "";
    jefaturaAuto.value = opt.dataset.jefatura || "";
  }

  select?.addEventListener("change", updateAutoFields);

  window.addEventListener("DOMContentLoaded", () => {
    updateAutoFields(); // llena si ya viene seleccionado (editar)
  });
</script>

{% endblock %}
