{% extends "base.html" %}
{% block title %}Impresora - Catálogo{% endblock %}

{% block content %}
<div class="card shadow-sm">
  <div class="card-body">
    <h2 class="mb-3">
      {% if mode == 'edit' %}Editar impresora{% else %}Nueva impresora{% endif %}
    </h2>

    <form method="post">
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label">IP *</label>
          <input class="form-control" name="ip" required value="{{ imp.ip if imp else '' }}">
        </div>

        <div class="col-md-4">
          <label class="form-label">Serie *</label>
          <input class="form-control" name="serie" required value="{{ imp.serie if imp else '' }}">
        </div>

        <div class="col-md-4">
          <label class="form-label">Modelo *</label>
          <input class="form-control" name="modelo" required value="{{ imp.modelo if imp else '' }}">
        </div>

        <div class="col-md-8">
          <label class="form-label">Ubicación *</label>
          <input class="form-control" name="ubicacion" required value="{{ imp.ubicacion if imp else '' }}">
        </div>

        <div class="col-md-4">
          <label class="form-label">Servidor *</label>
          <input class="form-control" name="servidor" required value="{{ imp.servidor if imp else '' }}">
        </div>
      </div>

      <div class="mt-3 d-flex gap-2">
        <button class="btn btn-success" type="submit">Guardar</button>
        <a href="{{ url_for('impresoras.catalogo_list') }}" class="btn btn-outline-secondary">Volver</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
