<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ingreso TI</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/login.css') }}" rel="stylesheet">
</head>

<body class="login-bg d-flex align-items-center justify-content-center">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-auto">

        <div class="card shadow-lg login-card">
          <div class="card-body p-4 p-md-5">

            <!-- Logo -->
            <div class="text-center mb-3">
              <img src="{{ url_for('static', filename='img/logo.jpg') }}" class="login-logo mb-2" alt="Logo">
              <h4 class="mb-1">Control HDT TI</h4>
              <div class="small-muted">Acceso al sistema</div>
            </div>

            <!-- Mensajes de error -->
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for cat, msg in messages %}
                  <div class="alert alert-{{ cat }} py-2">{{ msg }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form method="post" autocomplete="on">
              <div class="mb-3">
                <label class="form-label">Usuario</label>
                <input class="form-control" name="username" placeholder="Ej: rmonge" required>
              </div>

              <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input class="form-control" type="password" name="password" placeholder="••••••••" required>
              </div>

              <button class="btn btn-primary w-100 py-2">
                Ingresar
              </button>
            </form>

            <div class="text-center mt-3 small text-muted">
              © {{ 2026 }} Control TI • Soporte Técnico
            </div>

          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
